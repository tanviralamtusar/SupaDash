# Build SupaDash Studio and push to GitHub Container Registry (GHCR)
# Triggered on pushes to main that touch studio files.
# Coolify pulls the pre-built image instead of building on the server.

name: Build Studio

on:
  push:
    branches: [main]
    paths:
      - 'studio/**'
      - '.github/workflows/build-studio.yml'
  workflow_dispatch: # Allow manual trigger

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/supadash-studio
  STUDIO_VERSION: v1.24.04

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout SupaDash repo
        uses: actions/checkout@v4

      - name: Prepare Studio build context
        run: |
          set -euo pipefail
          
          echo "=== SupaDash Studio CI Build ==="
          echo "  Supabase Studio version: ${{ env.STUDIO_VERSION }}"

          cd studio
          chmod +x patch.sh build.sh
          
          echo "[1/2] Cloning and patching Supabase Studio..."
          ./patch.sh ${{ env.STUDIO_VERSION }}

          if [ -d "code-${{ env.STUDIO_VERSION }}" ]; then
            echo "  ✓ Patched studio source ready at code-${{ env.STUDIO_VERSION }}"
          else
            echo "  ✗ Failed to create code-${{ env.STUDIO_VERSION }}"
            exit 1
          fi

          echo "=== Build context ready ==="

      - name: Bake Studio public environment
        env:
          # NEXT_PUBLIC_* variables are inlined by `next build`, so they must be
          # present in apps/studio/.env at image build time — a runtime env var
          # in docker-compose has NO effect. The browser (on the Studio domain)
          # calls the API cross-origin, so this must be the API's PUBLIC domain,
          # NOT an internal service name and NOT "/api".
          # Configure per-deployment via repo Variables; defaults below match the
          # current botbhai.net deployment.
          API_URL: ${{ vars.NEXT_PUBLIC_API_URL || 'https://supadash.botbhai.net' }}
          SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL || 'https://supadash-studio.botbhai.net' }}
        run: |
          set -euo pipefail
          cd studio/code-${{ env.STUDIO_VERSION }}/apps/studio

          # Start from the repo's studio env template, then override the URLs
          # that must point at the deployment's public domains.
          #   API_URL   → platform/profile/project REST calls (${API_URL}/platform/...)
          #   GOTRUE    → sign-in via the GoTrue client posts to ${GOTRUE_URL}/token,
          #               and the Go API serves that at /auth/token → base is ${API_URL}/auth
          #   SITE_URL  → post-signup redirect target (the Studio domain)
          cp "${{ github.workspace }}/studio/.env" .env
          sed -i "s|^NEXT_PUBLIC_API_URL=.*|NEXT_PUBLIC_API_URL=${API_URL}|" .env
          sed -i "s|^NEXT_PUBLIC_SITE_URL=.*|NEXT_PUBLIC_SITE_URL=${SITE_URL}|" .env
          sed -i "s|^NEXT_PUBLIC_GOTRUE_URL=.*|NEXT_PUBLIC_GOTRUE_URL=${API_URL}/auth|" .env

          echo "=== Baked studio public env ==="
          grep '^NEXT_PUBLIC_' .env

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=
            type=raw,value={{date 'YYYY-MM-DD'}}

      - name: Build and push Studio image
        uses: docker/build-push-action@v6
        with:
          context: ${{ github.workspace }}/studio/code-${{ env.STUDIO_VERSION }}
          file: ${{ github.workspace }}/studio/code-${{ env.STUDIO_VERSION }}/apps/studio/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
