# Build SupaDash Studio and push to GitHub Container Registry (GHCR)
# Triggered on pushes to main that touch studio files.
# Coolify pulls the pre-built image instead of building on the server.

name: Build Studio

on:
  push:
    branches: [main]
    paths:
      - 'studio/**'
      - '.github/workflows/build-studio.yml'
  workflow_dispatch: # Allow manual trigger

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/supadash-studio

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout SupaDash repo
        uses: actions/checkout@v4

      - name: Prepare Studio build context
        run: |
          set -euo pipefail
          STUDIO_VERSION="v1.26.03"
          BUILD_DIR="${GITHUB_WORKSPACE}/_studio_build"
          SUPADASH_STUDIO="${GITHUB_WORKSPACE}/studio"

          echo "=== SupaDash Studio CI Build ==="
          echo "  Supabase Studio version: $STUDIO_VERSION"

          # 1. Clone upstream Supabase Studio source code
          echo "[1/4] Cloning Supabase Studio $STUDIO_VERSION..."
          mkdir -p "$BUILD_DIR"
          cd "$BUILD_DIR"
          git clone --depth 1 --branch "$STUDIO_VERSION" --filter=blob:none --sparse \
            https://github.com/supabase/supabase.git supabase-src
          cd supabase-src
          git sparse-checkout set apps/studio
          echo "  ✓ Studio source downloaded"

          # 2. Assemble build context
          echo "[2/4] Assembling build context..."
          # Start with upstream Studio source code
          cp -r apps/studio "$BUILD_DIR/studio"

          # Use SupaDash repo's own packages (with pre-built CSS artifacts),
          # lockfile, and workspace config — NOT from upstream monorepo.
          # The repo's packages/ includes ui/build/css/ which is pre-generated.
          cp -r "$SUPADASH_STUDIO/packages" "$BUILD_DIR/studio/packages"
          cp "$SUPADASH_STUDIO/pnpm-lock.yaml" "$BUILD_DIR/studio/pnpm-lock.yaml"
          cp "$SUPADASH_STUDIO/pnpm-workspace.yaml" "$BUILD_DIR/studio/pnpm-workspace.yaml"
          echo "  ✓ Build context assembled"

          # 3. Clean original API routes & apply SupaDash patches
          echo "[3/4] Applying SupaDash patches..."
          rm -rf "$BUILD_DIR/studio/pages/api"
          mkdir -p "$BUILD_DIR/studio/pages/api"
          if [ -d "$SUPADASH_STUDIO/files" ]; then
            cp -r "$SUPADASH_STUDIO/files"/* "$BUILD_DIR/studio/"
            echo "  ✓ Patches applied"
          fi

          # 4. Copy Dockerfile & verify
          echo "[4/4] Final verification..."
          cp "$SUPADASH_STUDIO/Dockerfile" "$BUILD_DIR/studio/Dockerfile"
          cp "$SUPADASH_STUDIO/.dockerignore" "$BUILD_DIR/studio/.dockerignore"

          for f in pnpm-lock.yaml pnpm-workspace.yaml package.json; do
            [ -f "$BUILD_DIR/studio/$f" ] && echo "  ✓ $f" || { echo "  ✗ $f MISSING"; exit 1; }
          done
          [ -d "$BUILD_DIR/studio/packages/ui/build/css" ] && echo "  ✓ packages/ui/build/css (pre-built)" || echo "  ⚠ packages/ui/build/css missing"

          echo "=== Build context ready ==="

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=
            type=raw,value={{date 'YYYY-MM-DD'}}

      - name: Build and push Studio image
        uses: docker/build-push-action@v6
        with:
          context: ${{ github.workspace }}/_studio_build/studio
          file: ${{ github.workspace }}/_studio_build/studio/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
