# SupaDash — Production Docker Compose
# Usage: docker compose -f docker-compose.prod.yml up -d

services:
  api:
    build: .
    image: supadash/api:latest
    container_name: supadash-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - projects_data:/app/projects
    env_file: .env
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-supadash}?sslmode=disable
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  db:
    image: postgres:15-alpine
    container_name: supadash-db
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-supadash}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  studio:
    build:
      context: ./studio
      dockerfile: Dockerfile
    image: supadash/studio:latest
    container_name: supadash-studio
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      - SUPADASH_API_URL=http://api:8080
      - STUDIO_PG_META_URL=http://api:8080/platform/pg-meta
      - NEXT_PUBLIC_SITE_TITLE=SupaDash
      - NEXT_PUBLIC_ENABLE_LOGS=true
      - NEXT_ANALYTICS_BACKEND_PROVIDER=postgres
      - HOSTNAME=0.0.0.0
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/platform/profile').then(r => { if (r.status !== 200) throw new Error(r.status) })"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  caddy:
    image: caddy:2-alpine
    container_name: supadash-caddy
    restart: unless-stopped
    depends_on:
      - api
      - studio
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
    driver: local
  projects_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local
